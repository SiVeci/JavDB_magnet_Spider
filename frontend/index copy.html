<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavDB 磁力智能爬虫节点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义滚动条以便于手机端滑动 */
        .log-box::-webkit-scrollbar { width: 6px; }
        .log-box::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="text-center md:text-left">
            <h1 class="text-3xl font-bold text-gray-800">🧲 JavDB 磁力智能爬虫</h1>
            <p class="text-gray-500 mt-2 text-sm">后台静默执行 · 自动优选最高质量磁力链</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">⚙️ 任务配置</h2>
                
                <div class="space-y-4 text-sm">
                    <div>
                        <label class="block text-gray-600 mb-1">起始页面 URL (必填)</label>
                        <input type="text" id="start_url" placeholder="例如: https://javdb.com/actors/..." class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">Cookie (必填)</label>
                        <textarea id="cookie" rows="3" placeholder="请粘贴最新的完整 Cookie..." class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">User-Agent</label>
                        <input type="text" id="user_agent" placeholder="填入与 Cookie 配套的浏览器 UA" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-600 mb-1">HTTP 代理 (可选)</label>
                        <input type="text" id="proxies" placeholder="例如: http://127.0.0.1:7890 (留空则不使用代理)" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <button id="startBtn" onclick="startTask()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-2 shadow-md">
                        🚀 提交并开始运行
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">📊 实时监控</h2>
                
                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span id="statusLabel" class="text-blue-600 font-medium">状态: 闲置中</span>
                        <span id="progressText" class="text-gray-600 font-mono">0/0</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                        <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div class="mt-2 text-xs text-gray-500 text-right">正在处理: <span id="currentCode" class="font-mono font-bold text-gray-700">-</span></div>
                </div>

                <div class="flex-grow bg-gray-50 rounded-lg border border-gray-200 p-3 h-48 overflow-y-auto log-box font-mono text-xs text-gray-600" id="logContainer">
                    <div>等待任务启动...</div>
                </div>

                <a id="downloadBtn" href="/api/download" target="_blank" class="hidden mt-4 text-center w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
                    📥 下载 CSV 结果文件
                </a>
            </div>
        </div>
    </div>

    <script>
        let pollInterval = null;

        // 页面加载时恢复上次保存的配置
        window.onload = function() {
            document.getElementById('start_url').value = localStorage.getItem('javdb_url') || '';
            document.getElementById('cookie').value = localStorage.getItem('javdb_cookie') || '';
            document.getElementById('user_agent').value = localStorage.getItem('javdb_ua') || 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0';
            document.getElementById('proxies').value = localStorage.getItem('javdb_proxies') || '';
            
            // 页面一打开就查一下状态，万一后台正在跑呢
            pollStatus();
        };

        async function startTask() {
            const url = document.getElementById('start_url').value.trim();
            const cookie = document.getElementById('cookie').value.trim();
            const ua = document.getElementById('user_agent').value.trim();
            const proxies = document.getElementById('proxies').value.trim();

            if (!url || !cookie) {
                alert("请至少填写 起始URL 和 Cookie！");
                return;
            }

            // 保存配置到本地，下次免填
            localStorage.setItem('javdb_url', url);
            localStorage.setItem('javdb_cookie', cookie);
            localStorage.setItem('javdb_ua', ua);
            localStorage.setItem('javdb_proxies', proxies);

            // 发送请求给后端
            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ start_url: url, cookie: cookie, user_agent: ua, proxies: proxies || null })
                });
                
                const res = await response.json();
                if (res.code === 200) {
                    document.getElementById('downloadBtn').classList.add('hidden'); // 隐藏下载按钮
                    pollStatus(); // 立刻拉取一次状态
                    if (!pollInterval) {
                        pollInterval = setInterval(pollStatus, 2000); // 开启2秒一轮询
                    }
                } else {
                    alert(res.msg);
                }
            } catch (err) {
                alert("请求发送失败，请检查后端服务是否启动。");
            }
        }

        async function pollStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // 更新文字状态
                document.getElementById('progressText').innerText = data.progress;
                document.getElementById('currentCode').innerText = data.current;
                
                // 更新进度条长度 (简单计算一下比例)
                if(data.progress && data.progress.includes('/')) {
                    const parts = data.progress.split('/');
                    if(parts[1] !== '0') {
                        const percent = (parseInt(parts[0]) / parseInt(parts[1])) * 100;
                        document.getElementById('progressBar').style.width = percent + '%';
                    }
                }

                // 渲染日志
                const logBox = document.getElementById('logContainer');
                logBox.innerHTML = '';
                if(data.logs && data.logs.length > 0) {
                    data.logs.forEach(log => {
                        const div = document.createElement('div');
                        div.className = "mb-1 border-b border-gray-100 pb-1";
                        // 给一些关键字上色
                        if(log.includes("成功")) div.classList.add("text-green-600");
                        if(log.includes("错误") || log.includes("失败")) div.classList.add("text-red-500");
                        div.innerText = log;
                        logBox.appendChild(div);
                    });
                    // 自动滚动到底部
                    logBox.scrollTop = logBox.scrollHeight;
                }

                // 处理状态显示
                const statusLabel = document.getElementById('statusLabel');
                if (data.state === "running") {
                    statusLabel.innerText = "状态: 🏃 正在运行...";
                    statusLabel.className = "text-blue-600 font-medium animate-pulse";
                    // 确保轮询开启
                    if (!pollInterval) pollInterval = setInterval(pollStatus, 2000);
                } else if (data.state === "finished") {
                    statusLabel.innerText = "状态: ✅ 任务完成";
                    statusLabel.className = "text-green-600 font-medium";
                    document.getElementById('downloadBtn').classList.remove('hidden'); // 显示下载按钮
                    clearInterval(pollInterval);
                    pollInterval = null;
                } else if (data.state === "error") {
                    statusLabel.innerText = "状态: ❌ 任务异常终止";
                    statusLabel.className = "text-red-600 font-medium";
                    clearInterval(pollInterval);
                    pollInterval = null;
                }
            } catch (err) {
                console.log("获取状态失败", err);
            }
        }
    </script>
</body>
</html>
